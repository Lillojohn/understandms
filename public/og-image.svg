<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb813c" />
      <stop offset="1" stop-color="#ea4a0c" />
    </linearGradient>
  </defs>

  <!-- Full square canvas (QuickLook rasterises SVGs into a square). The design
       lives in the central 1200x630 band; build tooling crops that band out. -->
  <rect width="1200" height="1200" fill="#fdf8f4" />

  <g transform="translate(0,285)">
    <!-- soft decorative blobs -->
    <circle cx="120" cy="90" r="220" fill="#ffe6d5" opacity="0.7" />
    <circle cx="1080" cy="560" r="240" fill="#d2f0ef" opacity="0.7" />

    <!-- badge / logo -->
    <g transform="translate(100,110)">
      <rect x="0" y="0" width="96" height="96" rx="26" fill="url(#spark)" />
      <line x1="18" y1="60" x2="78" y2="60" stroke="#fdf8f4" stroke-width="5" stroke-linecap="round" opacity="0.85" />
      <g fill="#d2f0ef" stroke="#16716f" stroke-width="2">
        <rect x="20" y="51" width="15" height="18" rx="4" />
        <rect x="61" y="51" width="15" height="18" rx="4" />
      </g>
      <path d="M51 18 l-11 20 h12 l-9 22 22 -28 h-12 z" fill="#ffffff" stroke="#c2360c" stroke-width="2" stroke-linejoin="round" />
    </g>

    <!-- title -->
    <text x="230" y="185" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#2c2622">Understanding MS</text>

    <!-- subtitle -->
    <text x="100" y="335" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="400" fill="#5c534c">What MS means in everyday and working life.</text>

    <!-- audience line -->
    <text x="100" y="470" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#c2360c">For employers &#183; family &#183; partners &#183; in 40 languages</text>
  </g>
</svg>
