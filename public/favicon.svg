<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MS begrijpen">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb813c" />
      <stop offset="1" stop-color="#ea4a0c" />
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#g)" />
  <!-- myelin segments on a nerve, echoing the "damaged wire" metaphor -->
  <line x1="12" y1="40" x2="52" y2="40" stroke="#fdf8f4" stroke-width="3" stroke-linecap="round" opacity="0.85" />
  <g fill="#d2f0ef" stroke="#16716f" stroke-width="1.5">
    <rect x="13" y="34" width="10" height="12" rx="3" />
    <rect x="41" y="34" width="10" height="12" rx="3" />
  </g>
  <!-- spark over the gap -->
  <path d="M34 12 l-7 13 h8 l-6 15 15 -19 h-8 z" fill="#ffffff" stroke="#c2360c" stroke-width="1.2" stroke-linejoin="round" />
</svg>
